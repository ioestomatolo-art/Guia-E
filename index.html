<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Formulario Estomatología</title>
  <link rel="shortcut icon" href="icono.ico" />
  <link rel="stylesheet" href="Formato.css" />
</head>
<body>
  <header class="site-header" role="banner">
    <button id="btnAdminAccess" class="admin-fab" type="button" aria-label="Acceso administrador" title="Acceso administrador">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12 2a4 4 0 0 1 4 4v1h1.5A2.5 2.5 0 0 1 20 9.5v8a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5v-8A2.5 2.5 0 0 1 6.5 7H8V6a4 4 0 0 1 4-4Zm2 5V6a2 2 0 1 0-4 0v1h4Zm-2 5.2a2.2 2.2 0 1 0 0 4.4 2.2 2.2 0 0 0 0-4.4Zm0 5.8c-2.2 0-4 1.2-4 2.7V21h8v-.3c0-1.5-1.8-2.7-4-2.7Z"/>
      </svg>
    </button>

    <img id="logo-sesver" src="Logos/sesver.png" alt="Logo SESVER"
         onerror="this.style.display='none';" />
  </header>

  <div id="page1" class="page activo">
    <div class="card">
      <h1 class="page-title">Formulario Estomatología</h1>
      <h2>Selecciona la categoría</h2>

      <div class="hospital-row" style="margin-bottom:12px; display:flex; gap:8px; align-items:center;">
        <label for="hospitalNombre" style="min-width:160px; font-weight:600;">Nombre del hospital:</label>
        <input list="listaHospitales" id="hospitalNombre" name="hospitalNombre"
               placeholder="Escribe o selecciona el hospital..."
               aria-label="Nombre del hospital"
               style="flex:1; padding:8px; border-radius:6px; border:1px solid #cbd5e1;" />
        <datalist id="listaHospitales"></datalist>
      </div>

      <select id="categoria" aria-label="Selecciona categoría">
        <option value="">--Seleccione--</option>
        <option value="insumos">Insumos</option>
        <option value="material">Material</option>
        <option value="equipo">Equipo médico</option>
        <option value="mobiliario">Mobiliario</option>
        <option value="bienesInformaticos">Bienes informáticos</option>
        <option value="instrumental">Instrumental</option>
      </select>

      <div class="actions" style="margin-top:12px; display:flex; justify-content:flex-end;">
        <button id="btnSiguiente" type="button">Siguiente</button>
      </div>
    </div>
  </div>

  <div id="page2" class="page oculto">
    <div class="card">
      <h2 id="tituloCategoria">Formulario</h2>

      <div class="controls">
        <button id="btnRegresar1" type="button">Regresar</button>
        <button id="btnAgregarFila" type="button">Agregar fila</button>
        <button id="btnEnviarInsumos" type="button">Enviar</button>
      </div>

      <table id="tablaInsumos" aria-label="Tabla de insumos">
        <thead>
          <tr>
            <th>No.</th>
            <th>Clave</th>
            <th>Descripción</th>
            <th>Stock</th>
            <th>Mínimo</th>
            <th>Estado</th>
            <th>Caducidad</th>
            <th>Días restantes</th>
            <th>Observaciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="Logica.js"></script>
</body>
</html>
