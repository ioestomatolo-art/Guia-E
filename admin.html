<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Administrador | Estomatología</title>
  <link rel="shortcut icon" href="icono.ico" />
  <link rel="stylesheet" href="Formato.css" />

</head>

<body>
  <header class="site-header" role="banner">
    <button id="btnAdminAccess" class="admin-fab" type="button" title="Acceso administrador" aria-label="Acceso administrador">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5zm0 2c-3.866 0-7 3.134-7 7h14c0-3.866-3.134-7-7-7z"/>
      </svg>
    </button>

    <img id="logo-sesver" src="Logos/sesver.png" alt="Logo SESVER" onerror="this.style.display='none';" />
  </header>

  <main class="admin-page">
    <section id="adminLoginView" class="admin-panel admin-login-box">
      <h1>Acceso administrador</h1>
      <p>Ingresa la contraseña para entrar al panel.</p>

      <form id="adminLoginForm" autocomplete="off">
        <label for="adminPass" class="sr-only">Contraseña de administrador</label>
        <input
          id="adminPass"
          type="password"
          placeholder="Contraseña de administrador"
          autocomplete="current-password"
        />

        <div class="admin-actions">
          <button id="btnAdminLogin" type="submit">Entrar</button>
          <button id="btnAdminClose" type="button">Volver</button>
        </div>

        <p id="adminMsg" class="admin-msg"></p>
      </form>
    </section>

    <section id="adminSection" class="admin-panel admin-hidden">
      <h2>Panel de administrador</h2>
      <p>Acceso concedido. Aquí puedes administrar registros.</p>

      <div class="admin-actions">
        <button id="btnAdminReload" type="button">Actualizar registros</button>
        <button id="btnAdminReport" type="button">Descargar reporte CSV</button>
        <button id="btnAdminLogout" type="button">Salir</button>
      </div>

      <div class="admin-filters">
        <input id="filterHospital" type="text" placeholder="Filtrar por clave o hospital" />
        <select id="filterCategoria">
          <option value="">Todas las categorías</option>
        </select>
        <button id="btnApplyFilters" type="button">Filtrar</button>
        <button id="btnClearFilters" type="button">Limpiar</button>
      </div>

      <div class="admin-table-wrap">
        <table id="adminTable" class="admin-table" aria-label="Registros de inventario">
          <thead>
            <tr>
              <th>Clave hospital</th>
              <th>Hospital</th>
              <th>Categoría</th>
              <th>Clave</th>
              <th>Descripción</th>
              <th>Stock</th>
              <th>Mínimo</th>
              <th>Fecha</th>
              <th>Días</th>
              <th>Observaciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const SERVER_BASE = "https://servidor-4wu6.onrender.com";
    const ADMIN_LOGIN_URL = `${SERVER_BASE}/admin/login`;
    const ADMIN_INVENTORY_URL = `${SERVER_BASE}/admin/inventory`;

    let adminToken = "";
    let adminRows = [];

    localStorage.removeItem("adminToken");

    const btnAdminAccess = document.getElementById("btnAdminAccess");
    const adminLoginView = document.getElementById("adminLoginView");
    const adminSection = document.getElementById("adminSection");
    const adminPass = document.getElementById("adminPass");
    const adminMsg = document.getElementById("adminMsg");
    const adminLoginForm = document.getElementById("adminLoginForm");
    const btnAdminClose = document.getElementById("btnAdminClose");
    const btnAdminReload = document.getElementById("btnAdminReload");
    const btnAdminReport = document.getElementById("btnAdminReport");
    const btnAdminLogout = document.getElementById("btnAdminLogout");
    const adminTableBody = document.querySelector("#adminTable tbody");
    const filterHospital = document.getElementById("filterHospital");
    const filterCategoria = document.getElementById("filterCategoria");
    const btnApplyFilters = document.getElementById("btnApplyFilters");
    const btnClearFilters = document.getElementById("btnClearFilters");

    function showLogin() {
      adminLoginView.classList.remove("admin-hidden");
      adminSection.classList.add("admin-hidden");
      adminMsg.textContent = "";
      adminPass.value = "";
      setTimeout(() => adminPass.focus(), 50);
    }

    function showPanel() {
      adminSection.classList.remove("admin-hidden");
      adminLoginView.classList.add("admin-hidden");
    }

    function authHeaders(extra = {}) {
      return {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${adminToken}`,
        ...extra
      };
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function normalizeText(v) {
      return String(v ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function getFilters() {
      return {
        q: normalizeText(filterHospital?.value || ""),
        categoria: normalizeText(filterCategoria?.value || "")
      };
    }

    function matchesFilters(row) {
      const { q, categoria } = getFilters();

      const hospitalClave = normalizeText(row.hospital_clave || row.hospitalClave || "");
      const hospitalNombre = normalizeText(row.hospital_nombre || row.hospitalNombre || "");
      const rowCat = normalizeText(row.categoria || "");

      if (q) {
        const hayMatch = hospitalClave.includes(q) || hospitalNombre.includes(q);
        if (!hayMatch) return false;
      }

      if (categoria && rowCat !== categoria) return false;

      return true;
    }

    function getFilteredRows() {
      return Array.isArray(adminRows) ? adminRows.filter(matchesFilters) : [];
    }

    function populateCategoryOptions(rows) {
      if (!filterCategoria) return;

      const current = filterCategoria.value;
      const cats = [...new Set((rows || [])
        .map(r => String(r.categoria || "").trim())
        .filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "es"));

      filterCategoria.innerHTML = `<option value="">Todas las categorías</option>`;
      for (const c of cats) {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        filterCategoria.appendChild(opt);
      }

      if ([...filterCategoria.options].some(o => o.value === current)) {
        filterCategoria.value = current;
      } else {
        filterCategoria.value = "";
      }
    }

    function renderAdminInventory() {
      if (!adminTableBody) return;
      adminTableBody.innerHTML = "";

      const list = getFilteredRows();

      if (!list.length) {
        adminTableBody.innerHTML = `<tr><td colspan="10">Sin registros</td></tr>`;
        return;
      }

      for (const item of list) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(item.hospital_clave || item.hospitalClave || "")}</td>
          <td>${escapeHtml(item.hospital_nombre || item.hospitalNombre || "")}</td>
          <td>${escapeHtml(item.categoria || "")}</td>
          <td>${escapeHtml(item.clave || "")}</td>
          <td>${escapeHtml(item.descripcion || "")}</td>
          <td>${escapeHtml(item.stock ?? "")}</td>
          <td>${escapeHtml(item.minimo ?? "")}</td>
          <td>${escapeHtml(item.fecha || "")}</td>
          <td>${escapeHtml(item.dias_restantes ?? item.dias ?? "")}</td>
          <td>${escapeHtml(item.observaciones || "")}</td>
        `;
        adminTableBody.appendChild(tr);
      }
    }

    async function loginAdmin() {
      const password = (adminPass.value || "").trim();
      if (!password) {
        adminMsg.textContent = "Escribe la contraseña.";
        return;
      }

      adminMsg.textContent = "Validando...";
      try {
        const res = await fetch(ADMIN_LOGIN_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok || !data.token) {
          adminMsg.textContent = "Contraseña incorrecta.";
          return;
        }

        adminToken = data.token;
        localStorage.setItem("adminToken", adminToken);
        adminMsg.textContent = "";
        showPanel();
        await loadAdminInventory();
      } catch (err) {
        console.error("Error login admin:", err);
        adminMsg.textContent = "No fue posible conectar con el servidor.";
      }
    }

    async function loadAdminInventory() {
      if (!adminTableBody) return;

      try {
        adminTableBody.innerHTML = `<tr><td colspan="10">Cargando...</td></tr>`;

        const res = await fetch(ADMIN_INVENTORY_URL, {
          method: "GET",
          headers: authHeaders()
        });

        if (!res.ok) {
          const txt = await res.text().catch(() => "");
          throw new Error(txt || `HTTP ${res.status}`);
        }

        const data = await res.json();
        adminRows = Array.isArray(data) ? data : [];

        populateCategoryOptions(adminRows);
        renderAdminInventory();
      } catch (err) {
        console.error("Error cargando inventario admin:", err);
        adminRows = [];
        renderAdminInventory();
      }
    }

    function csvEscape(v) {
      if (v === null || v === undefined) return "";
      const s = String(v);
      return /[,"\n\r]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }

    async function downloadAdminReport() {
      try {
        const rows = getFilteredRows();

        const header = [
          "hospital_clave",
          "hospital_nombre",
          "categoria",
          "clave",
          "descripcion",
          "stock",
          "minimo",
          "fecha",
          "dias_restantes",
          "observaciones"
        ];

        const lines = [header.join(",")];

        for (const r of rows) {
          lines.push(header.map(k => csvEscape(
            k === "hospital_clave" ? (r.hospital_clave || r.hospitalClave || "") :
            k === "hospital_nombre" ? (r.hospital_nombre || r.hospitalNombre || "") :
            k === "dias_restantes" ? (r.dias_restantes ?? r.dias ?? "") :
            (r[k] ?? "")
          )).join(","));
        }

        const csv = "\uFEFF" + lines.join("\r\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `reporte_admin_${new Date().toISOString().slice(0, 19).replace(/[:T]/g, "_")}.csv`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (err) {
        console.error("Error descargando reporte admin:", err);
        alert("No fue posible descargar el reporte.");
      }
    }

    btnAdminAccess && btnAdminAccess.addEventListener("click", showLogin);
    btnAdminClose && btnAdminClose.addEventListener("click", showLogin);

    adminLoginForm && adminLoginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      loginAdmin();
    });

    btnAdminReload && btnAdminReload.addEventListener("click", loadAdminInventory);
    btnAdminReport && btnAdminReport.addEventListener("click", downloadAdminReport);

    btnApplyFilters && btnApplyFilters.addEventListener("click", renderAdminInventory);

    btnClearFilters && btnClearFilters.addEventListener("click", () => {
      if (filterHospital) filterHospital.value = "";
      if (filterCategoria) filterCategoria.value = "";
      renderAdminInventory();
    });

    filterHospital && filterHospital.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        renderAdminInventory();
      }
    });

    filterCategoria && filterCategoria.addEventListener("change", renderAdminInventory);

    btnAdminLogout && btnAdminLogout.addEventListener("click", () => {
      localStorage.removeItem("adminToken");
      adminToken = "";
      adminRows = [];
      showLogin();
    });

    if (adminToken) {
      localStorage.removeItem("adminToken");
      adminToken = "";
      showLogin();
    } else {
      showLogin();
    }
  </script>
</body>
</html>
