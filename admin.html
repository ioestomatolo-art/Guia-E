<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Administrador | Estomatología</title>
  <link rel="shortcut icon" href="icono.ico" />
  <link rel="stylesheet" href="Formato.css" />
</head>
<body>
  <header class="site-header" role="banner">
    <button id="btnAdminAccess" class="admin-fab" type="button" title="Acceso administrador" aria-label="Acceso administrador">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5zm0 2c-3.866 0-7 3.134-7 7h14c0-3.866-3.134-7-7-7z"/>
      </svg>
    </button>

    <img id="logo-sesver" src="Logos/sesver.png" alt="Logo SESVER" onerror="this.style.display='none';" />
  </header>

  <main class="admin-page">
    <section id="adminLoginView" class="admin-panel">
      <h1>Acceso administrador</h1>
      <p>Ingresa la contraseña para entrar al panel.</p>

      <form id="adminLoginForm" autocomplete="off">
        <label for="adminPass" class="sr-only">Contraseña de administrador</label>
        <input
          id="adminPass"
          type="password"
          placeholder="Contraseña de administrador"
          autocomplete="current-password"
        />

        <div class="admin-actions">
          <button id="btnAdminLogin" type="submit">Entrar</button>
          <button id="btnAdminClose" type="button">Volver</button>
        </div>

        <p id="adminMsg" class="admin-msg"></p>
      </form>
    </section>

    <section id="adminSection" class="admin-panel admin-hidden">
      <h2>Panel de administrador</h2>
      <p>Acceso concedido. Aquí puedes administrar registros.</p>

      <div class="admin-actions">
        <button id="btnAdminReload" type="button">Actualizar registros</button>
        <button id="btnAdminReport" type="button">Descargar reporte CSV</button>
        <button id="btnAdminLogout" type="button">Salir</button>
      </div>

      <table id="adminTable" class="admin-table" aria-label="Registros de inventario">
        <thead>
          <tr>
            
              
                <th>Clave hospital</th>
                <th>Hospital</th>
                <th>Categoría</th>
                <th>Clave</th>
                <th>Descripción</th>
                <th>Stock</th>
                <th>Mínimo</th>
                <th>Fecha</th>
                <th>Días</th>
                <th>Observaciones</th>
            

          
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script>
    const SERVER_BASE = "https://servidor-4wu6.onrender.com";
    const ADMIN_LOGIN_URL = `${SERVER_BASE}/admin/login`;
    const ADMIN_INVENTORY_URL = `${SERVER_BASE}/admin/inventory`;
    const ADMIN_REPORT_URL = `${SERVER_BASE}/report?format=csv`;
  
    let adminToken = localStorage.getItem("adminToken") || "";
  
    const btnAdminAccess = document.getElementById("btnAdminAccess");
    const adminLoginView = document.getElementById("adminLoginView");
    const adminSection = document.getElementById("adminSection");
    const adminPass = document.getElementById("adminPass");
    const adminMsg = document.getElementById("adminMsg");
    const adminLoginForm = document.getElementById("adminLoginForm");
    const btnAdminClose = document.getElementById("btnAdminClose");
    const btnAdminReload = document.getElementById("btnAdminReload");
    const btnAdminReport = document.getElementById("btnAdminReport");
    const btnAdminLogout = document.getElementById("btnAdminLogout");
    const adminTableBody = document.querySelector("#adminTable tbody");
  
    function showLogin() {
      adminLoginView.classList.remove("admin-hidden");
      adminSection.classList.add("admin-hidden");
      adminMsg.textContent = "";
      adminPass.value = "";
      setTimeout(() => adminPass.focus(), 50);
    }
  
    function showPanel() {
      adminSection.classList.remove("admin-hidden");
      adminLoginView.classList.add("admin-hidden");
    }
  
    function authHeaders(extra = {}) {
      return {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${adminToken}`,
        ...extra
      };
    }
  
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  
    async function loginAdmin() {
      const password = (adminPass.value || "").trim();
      if (!password) {
        adminMsg.textContent = "Escribe la contraseña.";
        return;
      }
  
      adminMsg.textContent = "Validando...";
      try {
        const res = await fetch(ADMIN_LOGIN_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password })
        });
  
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok || !data.token) {
          adminMsg.textContent = "Contraseña incorrecta.";
          return;
        }
  
        adminToken = data.token;
        localStorage.setItem("adminToken", adminToken);
        adminMsg.textContent = "";
        showPanel();
        await loadAdminInventory();
      } catch (err) {
        console.error("Error login admin:", err);
        adminMsg.textContent = "No fue posible conectar con el servidor.";
      }
    }
  
    async function loadAdminInventory() {
      if (!adminTableBody) return;
      adminTableBody.innerHTML = "";
  
      try {
        const res = await fetch(ADMIN_INVENTORY_URL, {
          method: "GET",
          headers: authHeaders()
        });
  
        if (!res.ok) {
          const txt = await res.text().catch(() => "");
          throw new Error(txt || `HTTP ${res.status}`);
        }
  
        const data = await res.json();
        const list = Array.isArray(data) ? data : [];
  
        if (!list.length) {
          adminTableBody.innerHTML = `<tr><td colspan="10">Sin registros</td></tr>`;
          return;
        }
  
        for (const item of list) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${escapeHtml(item.hospital_clave || item.hospitalClave || "")}</td>
            <td>${escapeHtml(item.hospital_nombre || item.hospitalNombre || "")}</td>
            <td>${escapeHtml(item.categoria || "")}</td>
            <td>${escapeHtml(item.clave || "")}</td>
            <td>${escapeHtml(item.descripcion || "")}</td>
            <td>${escapeHtml(item.stock ?? "")}</td>
            <td>${escapeHtml(item.minimo ?? "")}</td>
            <td>${escapeHtml(item.fecha || "")}</td>
            <td>${escapeHtml(item.dias_restantes ?? item.dias ?? "")}</td>
            <td>${escapeHtml(item.observaciones || "")}</td>
          `;
          adminTableBody.appendChild(tr);
        }
      } catch (err) {
        console.error("Error cargando inventario admin:", err);
        adminTableBody.innerHTML = `<tr><td colspan="10">Error al cargar registros</td></tr>`;
      }
    }
  
    async function downloadAdminReport() {
      try {
        const res = await fetch(ADMIN_REPORT_URL, {
          method: "GET",
          headers: authHeaders()
        });
  
        if (!res.ok) {
          const txt = await res.text().catch(() => "");
          throw new Error(txt || `HTTP ${res.status}`);
        }
  
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `reporte_admin_${new Date().toISOString().slice(0, 19).replace(/[:T]/g, "_")}.csv`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (err) {
        console.error("Error descargando reporte admin:", err);
        alert("No fue posible descargar el reporte.");
      }
    }
  
    btnAdminAccess && btnAdminAccess.addEventListener("click", showLogin);
    btnAdminClose && btnAdminClose.addEventListener("click", showLogin);
  
    adminLoginForm && adminLoginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      loginAdmin();
    });
  
    btnAdminReload && btnAdminReload.addEventListener("click", loadAdminInventory);
    btnAdminReport && btnAdminReport.addEventListener("click", downloadAdminReport);
  
    btnAdminLogout && btnAdminLogout.addEventListener("click", () => {
      localStorage.removeItem("adminToken");
      adminToken = "";
      showLogin();
    });
  
    if (adminToken) {
      showPanel();
      loadAdminInventory();
    } else {
      showLogin();
    }
  </script>
</body>
</html>
